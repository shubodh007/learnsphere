<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnSphere - Lesson Generation Test</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #0f1119;
      color: #fff;
    }
    h1 { color: #8b5cf6; }
    .test-section {
      background: #1a1f2e;
      border: 1px solid #2a2f3e;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 10px 10px 0;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin: 10px 0; padding: 10px; border-radius: 4px; }
    .success { background: #10b98144; border: 1px solid #10b981; color: #10b981; }
    .error { background: #ef444444; border: 1px solid #ef4444; color: #ef4444; }
    .info { background: #3b82f644; border: 1px solid #3b82f6; color: #3b82f6; }
    .warning { background: #f59e0b44; border: 1px solid #f59e0b; color: #f59e0b; }
    pre {
      background: #0a0e16;
      border: 1px solid #2a2f3e;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
      color: #a0aec0;
    }
    input {
      width: 100%;
      padding: 10px;
      background: #0a0e16;
      border: 1px solid #2a2f3e;
      color: #fff;
      border-radius: 4px;
      font-size: 14px;
      margin: 10px 0;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff44;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>🧪 LearnSphere Lesson Generation Test</h1>

  <div class="test-section">
    <h2>Step 1: Check Authentication</h2>
    <button onclick="checkAuth()">Check Auth Status</button>
    <div id="auth-status"></div>
  </div>

  <div class="test-section">
    <h2>Step 2: Test Edge Function</h2>
    <input type="text" id="topic-input" placeholder="Enter a topic (e.g., Introduction to Python)" value="Test: JavaScript Basics">
    <select id="difficulty-input" style="width: 100%; padding: 10px; background: #0a0e16; border: 1px solid #2a2f3e; color: #fff; border-radius: 4px; margin: 10px 0;">
      <option value="beginner">Beginner</option>
      <option value="intermediate">Intermediate</option>
      <option value="advanced">Advanced</option>
    </select>
    <button onclick="testLessonGeneration()">Generate Lesson</button>
    <div id="generation-status"></div>
  </div>

  <div class="test-section">
    <h2>Step 3: View Diagnostic Info</h2>
    <button onclick="showDiagnostics()">Show Diagnostics</button>
    <div id="diagnostics"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://erpfdokhdjrgcywiytco.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVycGZkb2toZGpyZ2N5d2l5dGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzEwMzEsImV4cCI6MjA4OTg0NzAzMX0.PihxhB5jL0VYOJfqNmAeO1PhHIzAs8TmQLxxwcn4lJU';

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkAuth() {
      const statusDiv = document.getElementById('auth-status');
      statusDiv.innerHTML = '<div class="status info">Checking authentication...</div>';

      try {
        const { data: { session }, error } = await supabaseClient.auth.getSession();

        if (error) {
          statusDiv.innerHTML = `<div class="status error">❌ Auth error: ${error.message}</div>`;
          return;
        }

        if (!session) {
          statusDiv.innerHTML = `
            <div class="status warning">⚠️ Not logged in</div>
            <p>Please login first:</p>
            <button onclick="location.href='/'">Go to Login Page</button>
          `;
          return;
        }

        statusDiv.innerHTML = `
          <div class="status success">✅ Authenticated</div>
          <p><strong>Email:</strong> ${session.user.email}</p>
          <p><strong>User ID:</strong> ${session.user.id}</p>
          <p><strong>Token expires:</strong> ${new Date(session.expires_at * 1000).toLocaleString()}</p>
          <details style="margin-top: 10px;">
            <summary style="cursor: pointer;">Access Token</summary>
            <pre>${session.access_token.substring(0, 100)}...</pre>
          </details>
        `;
      } catch (err) {
        statusDiv.innerHTML = `<div class="status error">❌ Exception: ${err.message}</div>`;
        console.error(err);
      }
    }

    async function testLessonGeneration() {
      const statusDiv = document.getElementById('generation-status');
      const topic = document.getElementById('topic-input').value.trim();
      const difficulty = document.getElementById('difficulty-input').value;

      if (!topic) {
        statusDiv.innerHTML = '<div class="status error">❌ Please enter a topic</div>';
        return;
      }

      statusDiv.innerHTML = '<div class="status info"><span class="spinner"></span> Generating lesson... (this may take 10-30 seconds)</div>';

      try {
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (!session) {
          statusDiv.innerHTML = '<div class="status error">❌ Not authenticated. Please login first.</div>';
          return;
        }

        console.log('Calling Edge Function with:', { topic, difficulty });
        const startTime = Date.now();

        const response = await fetch(
          `${SUPABASE_URL}/functions/v1/generate-lesson`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ topic, difficulty }),
          }
        );

        const elapsed = Date.now() - startTime;
        const responseText = await response.text();

        console.log('Response status:', response.status);
        console.log('Response body:', responseText);

        if (!response.ok) {
          let errorMsg = responseText;
          try {
            const errorJson = JSON.parse(responseText);
            errorMsg = errorJson.error || errorMsg;
          } catch {}

          statusDiv.innerHTML = `
            <div class="status error">❌ Generation failed (${elapsed}ms)</div>
            <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
            <p><strong>Error:</strong> ${errorMsg}</p>
            <details>
              <summary>Raw Response</summary>
              <pre>${responseText}</pre>
            </details>
          `;
          return;
        }

        const data = JSON.parse(responseText);

        statusDiv.innerHTML = `
          <div class="status success">✅ Lesson generated successfully! (${elapsed}ms)</div>
          <p><strong>Title:</strong> ${data.title}</p>
          <p><strong>Slug:</strong> ${data.slug}</p>
          <p><strong>Difficulty:</strong> ${data.difficulty}</p>
          <p><strong>Summary:</strong> ${data.summary?.substring(0, 150)}...</p>
          <details>
            <summary>Full Response</summary>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          </details>
          <button onclick="location.href='/learn/${data.slug}'">View Lesson</button>
        `;

      } catch (err) {
        statusDiv.innerHTML = `
          <div class="status error">❌ Request failed</div>
          <p><strong>Error:</strong> ${err.message}</p>
          <details>
            <summary>Stack Trace</summary>
            <pre>${err.stack}</pre>
          </details>
        `;
        console.error(err);
      }
    }

    async function showDiagnostics() {
      const diagDiv = document.getElementById('diagnostics');
      diagDiv.innerHTML = '<div class="status info">Collecting diagnostics...</div>';

      try {
        const diagnostics = {
          timestamp: new Date().toISOString(),
          environment: {
            userAgent: navigator.userAgent,
            online: navigator.onLine,
            url: window.location.href,
          },
          supabase: {
            url: SUPABASE_URL,
            anonKey: SUPABASE_ANON_KEY.substring(0, 30) + '...',
          },
          localStorage: {},
          session: null,
        };

        // Check localStorage
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key.includes('supabase') || key.includes('auth')) {
            diagnostics.localStorage[key] = typeof localStorage.getItem(key);
          }
        }

        // Check session
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
          diagnostics.session = {
            userId: session.user.id,
            email: session.user.email,
            expiresAt: new Date(session.expires_at * 1000).toISOString(),
          };
        }

        diagDiv.innerHTML = `
          <div class="status info">📊 Diagnostics</div>
          <pre>${JSON.stringify(diagnostics, null, 2)}</pre>
        `;

      } catch (err) {
        diagDiv.innerHTML = `<div class="status error">❌ Error collecting diagnostics: ${err.message}</div>`;
      }
    }

    // Auto-check auth on load
    window.addEventListener('load', checkAuth);
  </script>
</body>
</html>
